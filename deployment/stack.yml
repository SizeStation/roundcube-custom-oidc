services:
  roundcube-bao-agent:
    image: openbao/openbao:2.5.5@sha256:6150c4a6b62067db6141c8da7a6a6b5763f4f47c315343d0c848b40fecdfd452
    command: ["agent", "-config=/etc/openbao/agent.hcl"]
    configs:
      - source: roundcube_bao_agent
        target: /etc/openbao/agent.hcl
    secrets:
      - roundcube_bao_role_id
      - roundcube_bao_secret_id
    volumes:
      - roundcube-bao-files:/run/app-secrets
    networks: [openbao]
    deploy:
      replicas: 1
      restart_policy: {condition: any, delay: 5s}

  roundcube:
    image: roundcube/roundcubemail:1.7.2-apache@sha256:76503fb00caf1cb0ee7731723d5bf31b492383b689d532fa943c70e885913687
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        for file in roundcube_des_key oidc-client-secret openbao-token; do
          until [ -s "/run/secrets/$$file" ]; do sleep 2; done
        done
        exec /docker-entrypoint.sh apache2-foreground
    environment:
      ROUNDCUBE_OIDC_ISSUER: "https://auth.sizestation.cloud/application/o/roundcube/"
      ROUNDCUBE_OIDC_CLIENT_ID: "REPLACE_WITH_AUTHENTIK_CLIENT_ID"
      ROUNDCUBE_OIDC_CLIENT_SECRET_FILE: "/run/secrets/oidc-client-secret"
      ROUNDCUBE_OIDC_REDIRECT_URI: "https://mail.sizestation.cloud/?_task=login&_action=plugin.sizestation_oidc.callback"
      ROUNDCUBE_OIDC_POST_LOGOUT_REDIRECT_URI: "https://mail.sizestation.cloud/"
      ROUNDCUBEMAIL_COMPOSER_PLUGINS: "sizestation/roundcube-oidc-suite:1.0.0-rc.19,seb1k/elastic2022:1.7.1"
      ROUNDCUBEMAIL_PLUGINS: "archive,zipdownload,roundcube_oidc_suite"
      ROUNDCUBEMAIL_SKIN: elastic2022
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: 25M
      ROUNDCUBEMAIL_USERNAME_DOMAIN: "sizestation.com"
      ROUNDCUBEMAIL_DEFAULT_HOST: "ssl://imap.purelymail.com"
      ROUNDCUBEMAIL_DEFAULT_PORT: "993"
      ROUNDCUBEMAIL_SMTP_SERVER: "tls://smtp.purelymail.com"
      ROUNDCUBEMAIL_SMTP_PORT: "587"
    configs:
      - source: roundcube_security
        target: /var/roundcube/config/zz-security.inc.php
    volumes:
      - roundcube_db:/var/roundcube/db
      - roundcube-bao-files:/run/secrets:ro
    networks: [public]
    deploy:
      replicas: 1
      restart_policy: {condition: any, delay: 5s}
      update_config:
        order: stop-first
        failure_action: rollback
      labels:
        - traefik.enable=true
        - traefik.http.routers.roundcube.rule=Host(`mail.sizestation.cloud`)
        - traefik.http.routers.roundcube.entrypoints=websecure
        - traefik.http.routers.roundcube.tls=true
        - traefik.http.services.roundcube.loadbalancer.server.port=80

volumes:
  roundcube_db:
    name: roundcube_db
  roundcube-bao-files:
    name: roundcube_bao_files
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1m,mode=0755,nosuid,nodev,noexec

networks:
  public: {external: true}
  openbao: {external: true}

configs:
  roundcube_bao_agent: {file: ./roundcube-agent.hcl}
  roundcube_security: {file: ./roundcube-security.inc.php}

secrets:
  roundcube_bao_role_id: {external: true}
  roundcube_bao_secret_id: {external: true}
